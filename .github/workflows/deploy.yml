name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "web/**"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Verify deployment
        run: |
          sleep 15
          CODE=$(curl -so /dev/null -w "%{http_code}" --max-time 10 "https://ohmyondas.levm.eu/")
          if [[ ! "$CODE" =~ ^(200|301|302|401)$ ]]; then
            echo "DEPLOY VERIFICATION FAILED: ohmyondas.levm.eu returned $CODE"
            exit 1
          fi
          echo "Deployment verified: ohmyondas.levm.eu returned $CODE"
