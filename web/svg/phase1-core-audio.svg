<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550">
<style>
    text { font-family: 'Courier New', monospace; }
    .fade { opacity: 0; }
    .s1 { animation: fadeIn 0.6s ease forwards 0.5s; }
    .s2 { animation: fadeIn 0.6s ease forwards 1.5s; }
    .s3 { animation: fadeIn 0.6s ease forwards 2.5s; }
    .s4 { animation: fadeIn 0.6s ease forwards 3.5s; }
    .s5 { animation: fadeIn 0.6s ease forwards 4.5s; }
    .s6 { animation: fadeIn 0.6s ease forwards 5.5s; }
    .s7 { animation: fadeIn 0.6s ease forwards 6.5s; }
    .s8 { animation: fadeIn 0.6s ease forwards 7.5s; }
    .wire1 { stroke-dasharray: 200; stroke-dashoffset: 200; animation: drawWire 0.8s ease forwards 3.0s; }
    .wire2 { stroke-dasharray: 200; stroke-dashoffset: 200; animation: drawWire 0.8s ease forwards 4.0s; }
    .wire3 { stroke-dasharray: 200; stroke-dashoffset: 200; animation: drawWire 0.8s ease forwards 5.0s; }
    .blink { animation: blink 1s ease infinite 7.5s; opacity: 0; }
    @keyframes fadeIn { to { opacity: 1; } }
    @keyframes drawWire { to { stroke-dashoffset: 0; } }
    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
</style>
<rect width="900" height="550" fill="#0d0d0d"/>

<!-- Title -->
<text x="450" y="35" fill="#27ae60" font-size="20" font-weight="bold" text-anchor="middle">PHASE 1: Core Audio Stack</text>
<text x="450" y="55" fill="#555" font-size="12" text-anchor="middle">Teensy 4.1 + Audio Shield Rev D2 + SD Card + Headphones</text>

<!-- Step 1: Breadboard appears -->
<g class="fade s1">
    <rect x="150" y="200" width="600" height="30" rx="4" fill="#2a2a1a" stroke="#555" stroke-width="1"/>
    <text x="450" y="220" fill="#888" font-size="12" text-anchor="middle">BREADBOARD 830pt</text>
    <line x1="200" y1="200" x2="200" y2="230" stroke="#444" stroke-width="0.5"/>
    <line x1="300" y1="200" x2="300" y2="230" stroke="#444" stroke-width="0.5"/>
    <line x1="400" y1="200" x2="400" y2="230" stroke="#444" stroke-width="0.5"/>
    <line x1="500" y1="200" x2="500" y2="230" stroke="#444" stroke-width="0.5"/>
    <line x1="600" y1="200" x2="600" y2="230" stroke="#444" stroke-width="0.5"/>
    <line x1="700" y1="200" x2="700" y2="230" stroke="#444" stroke-width="0.5"/>
    <text x="150" y="250" fill="#444" font-size="10">STEP 1: Place breadboard</text>
</g>

<!-- Step 2: Teensy placed -->
<g class="fade s2">
    <rect x="250" y="130" width="400" height="70" rx="8" fill="#1a5c1a" stroke="#27ae60" stroke-width="2.5"/>
    <text x="450" y="160" fill="#fff" font-size="16" font-weight="bold" text-anchor="middle">TEENSY 4.1</text>
    <text x="450" y="180" fill="#8fce8f" font-size="11" text-anchor="middle">NXP iMXRT1062 - 600MHz ARM Cortex-M7</text>
    <!-- Male pins going down into breadboard -->
    <line x1="280" y1="200" x2="280" y2="210" stroke="#c0c0c0" stroke-width="2"/>
    <line x1="320" y1="200" x2="320" y2="210" stroke="#c0c0c0" stroke-width="2"/>
    <line x1="360" y1="200" x2="360" y2="210" stroke="#c0c0c0" stroke-width="2"/>
    <line x1="400" y1="200" x2="400" y2="210" stroke="#c0c0c0" stroke-width="2"/>
    <line x1="440" y1="200" x2="440" y2="210" stroke="#c0c0c0" stroke-width="2"/>
    <line x1="480" y1="200" x2="480" y2="210" stroke="#c0c0c0" stroke-width="2"/>
    <line x1="520" y1="200" x2="520" y2="210" stroke="#c0c0c0" stroke-width="2"/>
    <line x1="560" y1="200" x2="560" y2="210" stroke="#c0c0c0" stroke-width="2"/>
    <line x1="600" y1="200" x2="600" y2="210" stroke="#c0c0c0" stroke-width="2"/>
    <!-- USB port -->
    <rect x="640" y="147" width="30" height="20" rx="2" fill="#333" stroke="#666" stroke-width="1"/>
    <text x="655" y="161" fill="#888" font-size="8" text-anchor="middle">USB</text>
    <text x="150" y="270" fill="#444" font-size="10">STEP 2: Insert Teensy into breadboard (spans center gap)</text>
</g>

<!-- Step 3: SD Card -->
<g class="fade s3">
    <rect x="230" y="140" width="40" height="25" rx="2" fill="#1a1a3a" stroke="#3498db" stroke-width="1.5"/>
    <text x="250" y="157" fill="#5dade2" font-size="8" text-anchor="middle">SD</text>
    <text x="250" y="122" fill="#5dade2" font-size="9" text-anchor="middle">32GB FAT32</text>
    <line x1="250" y1="125" x2="250" y2="138" stroke="#5dade2" stroke-width="1" marker-end="url(#arrow)"/>
    <text x="150" y="290" fill="#444" font-size="10">STEP 3: Insert SD card (FAT32, PJRC WAV files) into Teensy BUILT-IN slot</text>
</g>

<!-- Arrow marker -->
<defs><marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#5dade2"/></marker></defs>

<!-- Step 4: Audio Shield stacks on top -->
<g class="fade s4">
    <rect x="270" y="72" width="360" height="56" rx="6" fill="#1a3a1a" stroke="#2ecc71" stroke-width="2"/>
    <text x="450" y="95" fill="#2ecc71" font-size="14" font-weight="bold" text-anchor="middle">AUDIO SHIELD Rev D2</text>
    <text x="450" y="112" fill="#888" font-size="10" text-anchor="middle">SGTL5000 Codec - stacks via female headers</text>
    <!-- stacking arrow -->
    <text x="450" y="68" fill="#2ecc71" font-size="14" text-anchor="middle">&#9660; stacks on top &#9660;</text>
    <!-- Header connections -->
    <line x1="300" y1="128" x2="300" y2="130" stroke="#c0c0c0" stroke-width="3"/>
    <line x1="340" y1="128" x2="340" y2="130" stroke="#c0c0c0" stroke-width="3"/>
    <line x1="380" y1="128" x2="380" y2="130" stroke="#c0c0c0" stroke-width="3"/>
    <line x1="420" y1="128" x2="420" y2="130" stroke="#c0c0c0" stroke-width="3"/>
    <line x1="460" y1="128" x2="460" y2="130" stroke="#c0c0c0" stroke-width="3"/>
    <line x1="500" y1="128" x2="500" y2="130" stroke="#c0c0c0" stroke-width="3"/>
    <line x1="540" y1="128" x2="540" y2="130" stroke="#c0c0c0" stroke-width="3"/>
    <line x1="580" y1="128" x2="580" y2="130" stroke="#c0c0c0" stroke-width="3"/>
    <text x="150" y="310" fill="#444" font-size="10">STEP 4: Stack Audio Shield on Teensy via soldered female headers</text>
</g>

<!-- Step 5: Headphones -->
<g class="fade s5">
    <rect x="680" y="80" width="100" height="40" rx="6" fill="#1a1a1a" stroke="#888" stroke-width="1.5"/>
    <text x="730" y="100" fill="#ccc" font-size="11" text-anchor="middle">3.5mm</text>
    <text x="730" y="114" fill="#888" font-size="9" text-anchor="middle">PHONES</text>
    <line class="wire2" x1="630" y1="95" x2="680" y2="95" stroke="#888" stroke-width="2"/>
    <text x="150" y="330" fill="#444" font-size="10">STEP 5: Plug headphones into Audio Shield 3.5mm jack</text>
</g>

<!-- Step 6: USB cable -->
<g class="fade s6">
    <line class="wire3" x1="670" y1="157" x2="780" y2="157" stroke="#e74c3c" stroke-width="2"/>
    <rect x="780" y="140" width="90" height="35" rx="4" fill="#1a1a1a" stroke="#e74c3c" stroke-width="1.5"/>
    <text x="825" y="158" fill="#e74c3c" font-size="10" text-anchor="middle">USB to PC</text>
    <text x="825" y="170" fill="#666" font-size="8" text-anchor="middle">micro-USB</text>
    <text x="150" y="350" fill="#444" font-size="10">STEP 6: Connect USB to computer</text>
</g>

<!-- Step 7: Firmware -->
<g class="fade s7">
    <rect x="150" y="380" width="600" height="70" rx="6" fill="#0a0a0a" stroke="#333" stroke-width="1"/>
    <text x="170" y="400" fill="#5dade2" font-size="12">#define SDCARD_CS_PIN    BUILTIN_SDCARD</text>
    <text x="170" y="418" fill="#666" font-size="11">// DO NOT use pins 10/7/14 (Audio Shield SD - unused)</text>
    <text x="170" y="438" fill="#888" font-size="11">Flash WavFilePlayer example. Serial Monitor 9600 baud.</text>
    <text x="150" y="470" fill="#444" font-size="10">STEP 7: Flash WavFilePlayer, set BUILTIN_SDCARD, upload</text>
</g>

<!-- Step 8: Validation -->
<g class="blink">
    <rect x="200" y="490" width="500" height="40" rx="8" fill="#0a2a0a" stroke="#27ae60" stroke-width="2"/>
    <text x="450" y="516" fill="#27ae60" font-size="16" font-weight="bold" text-anchor="middle">&#10003; HEAR WAV AUDIO THROUGH HEADPHONES</text>
</g>

<!-- Auto-connected pins legend -->
<g class="fade s4">
    <text x="60" y="148" fill="#e74c3c" font-size="9">Auto-connected via headers:</text>
    <text x="60" y="162" fill="#666" font-size="8">Pin 7: I2S TX (data out)</text>
    <text x="60" y="174" fill="#666" font-size="8">Pin 8: I2S RX (data in)</text>
    <text x="60" y="186" fill="#666" font-size="8">Pins 18/19: I2C (control)</text>
    <text x="60" y="198" fill="#666" font-size="8">Pins 20/21/23: I2S clocks</text>
</g>
</svg>
