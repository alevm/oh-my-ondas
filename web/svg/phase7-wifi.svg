<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380">
<style>
    text { font-family: 'Courier New', monospace; }
    .fade { opacity: 0; }
    .s1 { animation: fadeIn 0.6s ease forwards 0.5s; }
    .s2 { animation: fadeIn 0.6s ease forwards 2.0s; }
    .s3 { animation: fadeIn 0.6s ease forwards 3.5s; }
    .s4 { animation: fadeIn 0.6s ease forwards 5.0s; }
    .w1 { stroke-dasharray: 200; stroke-dashoffset: 200; animation: draw 0.8s ease forwards 2.5s; }
    .w2 { stroke-dasharray: 200; stroke-dashoffset: 200; animation: draw 0.8s ease forwards 2.8s; }
    .w3 { stroke-dasharray: 200; stroke-dashoffset: 200; animation: draw 0.6s ease forwards 3.1s; }
    .w4 { stroke-dasharray: 200; stroke-dashoffset: 200; animation: draw 0.6s ease forwards 3.4s; }
    .data-flow { animation: flow 1.5s linear infinite 5.0s; }
    .blink { animation: blink 1s ease infinite 6.5s; opacity: 0; }
    @keyframes fadeIn { to { opacity: 1; } }
    @keyframes draw { to { stroke-dashoffset: 0; } }
    @keyframes flow { 0% { opacity: 0; transform: translateX(-20px); } 50% { opacity: 1; } 100% { opacity: 0; transform: translateX(20px); } }
    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
</style>
<rect width="900" height="380" fill="#0d0d0d"/>

<text x="450" y="35" fill="#27ae60" font-size="20" font-weight="bold" text-anchor="middle">PHASE 7: ESP32-S2 WiFi Link</text>
<text x="450" y="55" fill="#555" font-size="12" text-anchor="middle">Program ESP32 first, then connect UART to Teensy</text>

<!-- Step 1: ESP32 standalone -->
<g class="fade s1">
    <rect x="550" y="85" width="280" height="130" rx="8" fill="#2a0a2a" stroke="#8e24aa" stroke-width="2"/>
    <text x="690" y="115" fill="#ce93d8" font-size="16" font-weight="bold" text-anchor="middle">ESP32-S2</text>
    <text x="690" y="135" fill="#888" font-size="11" text-anchor="middle">SparkFun Thing Plus</text>
    <text x="690" y="158" fill="#666" font-size="10" text-anchor="middle">1. Program via own USB first</text>
    <text x="690" y="175" fill="#666" font-size="10" text-anchor="middle">2. Flash WiFi test sketch</text>
    <text x="690" y="192" fill="#27ae60" font-size="10" text-anchor="middle">3. Verify WiFi connects</text>
    <!-- WiFi waves -->
    <path d="M 810 100 Q 825 90, 840 100" fill="none" stroke="#8e24aa" stroke-width="1.5" opacity="0.6"/>
    <path d="M 805 95 Q 825 80, 845 95" fill="none" stroke="#8e24aa" stroke-width="1.5" opacity="0.4"/>
    <path d="M 800 90 Q 825 70, 850 90" fill="none" stroke="#8e24aa" stroke-width="1.5" opacity="0.2"/>
    <!-- USB port -->
    <rect x="820" y="142" width="25" height="16" rx="2" fill="#333" stroke="#666" stroke-width="1"/>
    <text x="832" y="154" fill="#888" font-size="7" text-anchor="middle">USB</text>
</g>

<!-- Teensy -->
<g class="fade s2">
    <rect x="70" y="85" width="280" height="130" rx="8" fill="#1a5c1a" stroke="#27ae60" stroke-width="2"/>
    <text x="210" y="115" fill="#fff" font-size="16" font-weight="bold" text-anchor="middle">TEENSY 4.1</text>
    <text x="210" y="140" fill="#8fce8f" font-size="10" text-anchor="middle">Serial1.begin(115200)</text>
    <text x="210" y="160" fill="#666" font-size="10" text-anchor="middle">Pin 0 = RX1 (receive from ESP32)</text>
    <text x="210" y="177" fill="#666" font-size="10" text-anchor="middle">Pin 1 = TX1 (send to ESP32)</text>
</g>

<!-- Step 2: UART wires -->
<g class="fade s3">
    <!-- TX wire (ESP32 TX -> Teensy RX) -->
    <line class="w1" x1="350" y1="130" x2="550" y2="130" stroke="#ce93d8" stroke-width="3"/>
    <text x="450" y="122" fill="#ce93d8" font-size="11" font-weight="bold" text-anchor="middle">UART TX &#8594; RX</text>
    <polygon points="350,130 360,125 360,135" fill="#ce93d8"/>

    <!-- RX wire (Teensy TX -> ESP32 RX) -->
    <line class="w2" x1="350" y1="160" x2="550" y2="160" stroke="#9b59b6" stroke-width="3"/>
    <text x="450" y="178" fill="#9b59b6" font-size="11" font-weight="bold" text-anchor="middle">UART RX &#8592; TX</text>
    <polygon points="550,160 540,155 540,165" fill="#9b59b6"/>

    <!-- 5V power -->
    <line class="w3" x1="350" y1="190" x2="550" y2="190" stroke="#e74c3c" stroke-width="2"/>
    <text x="450" y="206" fill="#e74c3c" font-size="10" text-anchor="middle">5V (VIN &#8594; VBUS)</text>

    <!-- GND -->
    <line class="w4" x1="350" y1="205" x2="550" y2="205" stroke="#666" stroke-width="2"/>
    <text x="450" y="220" fill="#666" font-size="10" text-anchor="middle">GND</text>
</g>

<!-- Data flowing -->
<g class="fade s4">
    <circle class="data-flow" cx="450" cy="130" r="3" fill="#ce93d8"/>
    <circle class="data-flow" cx="450" cy="160" r="3" fill="#9b59b6" style="animation-delay:5.5s"/>
</g>

<!-- Power warning -->
<g class="fade s3">
    <rect x="140" y="248" width="620" height="50" rx="6" fill="#2a1500" stroke="#e67e22" stroke-width="1.5"/>
    <text x="450" y="268" fill="#e67e22" font-size="12" font-weight="bold" text-anchor="middle">&#9888; POWER: ESP32 from 5V rail (VBUS), NOT from Teensy 3.3V</text>
    <text x="450" y="286" fill="#c68600" font-size="10" text-anchor="middle">DO NOT connect ESP32 3.3V to Teensy 3.3V — each board has its own regulator</text>
</g>

<!-- Firmware -->
<g class="fade s4">
    <rect x="140" y="308" width="620" height="35" rx="4" fill="#0a0a0a" stroke="#333" stroke-width="1"/>
    <text x="160" y="330" fill="#5dade2" font-size="11">if (Serial1.available()) { msg = Serial1.readStringUntil('\n'); }</text>
</g>

<!-- Validation -->
<g class="blink">
    <rect x="180" y="350" width="540" height="30" rx="8" fill="#0a2a0a" stroke="#27ae60" stroke-width="2"/>
    <text x="450" y="370" fill="#27ae60" font-size="13" font-weight="bold" text-anchor="middle">&#10003; TEENSY RECEIVES ESP32 MESSAGES — AUDIO CLEAN</text>
</g>
</svg>
