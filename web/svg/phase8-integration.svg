<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480">
<style>
    text { font-family: 'Courier New', monospace; }
    .fade { opacity: 0; }
    .s1 { animation: fadeIn 0.5s ease forwards 0.3s; }
    .s2 { animation: fadeIn 0.5s ease forwards 1.0s; }
    .s3 { animation: fadeIn 0.5s ease forwards 1.7s; }
    .s4 { animation: fadeIn 0.5s ease forwards 2.4s; }
    .s5 { animation: fadeIn 0.5s ease forwards 3.1s; }
    .s6 { animation: fadeIn 0.5s ease forwards 3.8s; }
    .s7 { animation: fadeIn 0.5s ease forwards 4.5s; }
    .check { animation: checkIn 0.4s ease forwards; }
    .c1 { animation: checkIn 0.4s ease forwards 5.5s; opacity: 0; }
    .c2 { animation: checkIn 0.4s ease forwards 5.8s; opacity: 0; }
    .c3 { animation: checkIn 0.4s ease forwards 6.1s; opacity: 0; }
    .c4 { animation: checkIn 0.4s ease forwards 6.4s; opacity: 0; }
    .c5 { animation: checkIn 0.4s ease forwards 6.7s; opacity: 0; }
    .c6 { animation: checkIn 0.4s ease forwards 7.0s; opacity: 0; }
    .c7 { animation: checkIn 0.4s ease forwards 7.3s; opacity: 0; }
    .c8 { animation: checkIn 0.4s ease forwards 7.6s; opacity: 0; }
    .c9 { animation: checkIn 0.4s ease forwards 7.9s; opacity: 0; }
    .c10 { animation: checkIn 0.4s ease forwards 8.2s; opacity: 0; }
    .c11 { animation: checkIn 0.4s ease forwards 8.5s; opacity: 0; }
    .c12 { animation: checkIn 0.4s ease forwards 8.8s; opacity: 0; }
    .final { animation: finalGlow 1.5s ease infinite 9.5s; opacity: 0; }
    @keyframes fadeIn { to { opacity: 1; } }
    @keyframes checkIn { to { opacity: 1; } }
    @keyframes finalGlow { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
</style>
<rect width="900" height="480" fill="#0d0d0d"/>

<text x="450" y="35" fill="#27ae60" font-size="22" font-weight="bold" text-anchor="middle">PHASE 8: Full Integration Test</text>
<text x="450" y="55" fill="#555" font-size="12" text-anchor="middle">All systems running simultaneously &mdash; no conflicts</text>

<!-- Central Teensy -->
<g class="fade s1">
    <rect x="320" y="75" width="260" height="60" rx="8" fill="#1a5c1a" stroke="#27ae60" stroke-width="3"/>
    <text x="450" y="105" fill="#fff" font-size="16" font-weight="bold" text-anchor="middle">TEENSY 4.1</text>
    <text x="450" y="125" fill="#8fce8f" font-size="10" text-anchor="middle">600MHz &mdash; Target: CPU &lt; 70%</text>
</g>

<!-- Surrounding subsystems with connections -->
<!-- Audio -->
<g class="fade s2">
    <rect x="40" y="65" width="150" height="55" rx="6" fill="#1a1a1a" stroke="#27ae60" stroke-width="1.5"/>
    <text x="115" y="88" fill="#27ae60" font-size="11" font-weight="bold" text-anchor="middle">AUDIO SHIELD</text>
    <text x="115" y="103" fill="#666" font-size="9" text-anchor="middle">I2S + I2C0 (0x0A)</text>
    <line x1="190" y1="90" x2="320" y2="100" stroke="#27ae60" stroke-width="1" stroke-dasharray="3"/>
</g>

<!-- GPS -->
<g class="fade s3">
    <rect x="40" y="150" width="150" height="55" rx="6" fill="#1a1a1a" stroke="#3498db" stroke-width="1.5"/>
    <text x="115" y="173" fill="#5dade2" font-size="11" font-weight="bold" text-anchor="middle">PA1010D GPS</text>
    <text x="115" y="190" fill="#666" font-size="9" text-anchor="middle">I2C0 (0x10)</text>
    <line x1="190" y1="175" x2="320" y2="110" stroke="#3498db" stroke-width="1" stroke-dasharray="3"/>
</g>

<!-- OLED -->
<g class="fade s3">
    <rect x="710" y="65" width="150" height="55" rx="6" fill="#1a1a1a" stroke="#8e24aa" stroke-width="1.5"/>
    <text x="785" y="88" fill="#ce93d8" font-size="11" font-weight="bold" text-anchor="middle">SSD1306 OLED</text>
    <text x="785" y="103" fill="#666" font-size="9" text-anchor="middle">I2C0 (0x3C)</text>
    <line x1="710" y1="90" x2="580" y2="100" stroke="#8e24aa" stroke-width="1" stroke-dasharray="3"/>
</g>

<!-- LCD -->
<g class="fade s4">
    <rect x="710" y="150" width="150" height="55" rx="6" fill="#1a1a1a" stroke="#e67e22" stroke-width="1.5"/>
    <text x="785" y="173" fill="#f39c12" font-size="11" font-weight="bold" text-anchor="middle">ILI9341 LCD</text>
    <text x="785" y="190" fill="#666" font-size="9" text-anchor="middle">SPI (DMA)</text>
    <line x1="710" y1="175" x2="580" y2="110" stroke="#e67e22" stroke-width="1" stroke-dasharray="3"/>
</g>

<!-- CAP1188 -->
<g class="fade s4">
    <rect x="40" y="235" width="150" height="55" rx="6" fill="#1a1a1a" stroke="#cd7f32" stroke-width="1.5"/>
    <text x="115" y="258" fill="#cd7f32" font-size="11" font-weight="bold" text-anchor="middle">CAP1188 TOUCH</text>
    <text x="115" y="275" fill="#666" font-size="9" text-anchor="middle">I2C1 (0x29)</text>
    <line x1="190" y1="260" x2="380" y2="135" stroke="#cd7f32" stroke-width="1" stroke-dasharray="3"/>
</g>

<!-- ADS1115 -->
<g class="fade s5">
    <rect x="245" y="170" width="130" height="45" rx="6" fill="#1a1a1a" stroke="#f39c12" stroke-width="1.5"/>
    <text x="310" y="192" fill="#f39c12" font-size="11" font-weight="bold" text-anchor="middle">ADS1115</text>
    <text x="310" y="207" fill="#666" font-size="8" text-anchor="middle">I2C0 (0x48)</text>
    <line x1="310" y1="170" x2="400" y2="135" stroke="#f39c12" stroke-width="1" stroke-dasharray="3"/>
</g>

<!-- MCP23017s -->
<g class="fade s5">
    <rect x="525" y="170" width="130" height="45" rx="6" fill="#1a1a1a" stroke="#e67e22" stroke-width="1.5"/>
    <text x="590" y="192" fill="#e67e22" font-size="11" font-weight="bold" text-anchor="middle">MCP23017 x2</text>
    <text x="590" y="207" fill="#666" font-size="8" text-anchor="middle">I2C1 (0x20, 0x21)</text>
    <line x1="590" y1="170" x2="500" y2="135" stroke="#e67e22" stroke-width="1" stroke-dasharray="3"/>
</g>

<!-- ESP32 -->
<g class="fade s6">
    <rect x="710" y="235" width="150" height="55" rx="6" fill="#1a1a1a" stroke="#8e24aa" stroke-width="1.5"/>
    <text x="785" y="258" fill="#ce93d8" font-size="11" font-weight="bold" text-anchor="middle">ESP32-S2</text>
    <text x="785" y="275" fill="#666" font-size="9" text-anchor="middle">UART Serial1</text>
    <line x1="710" y1="260" x2="580" y2="120" stroke="#8e24aa" stroke-width="1" stroke-dasharray="3"/>
</g>

<!-- NeoPixels -->
<g class="fade s6">
    <rect x="430" y="170" width="80" height="40" rx="6" fill="#1a1a1a" stroke="#27ae60" stroke-width="1.5"/>
    <text x="470" y="195" fill="#27ae60" font-size="9" font-weight="bold" text-anchor="middle">NeoPixel</text>
    <line x1="470" y1="170" x2="450" y2="135" stroke="#27ae60" stroke-width="1" stroke-dasharray="3"/>
</g>

<!-- Checklist -->
<g class="fade s7">
    <rect x="60" y="310" width="380" height="160" rx="8" fill="#0a0a0a" stroke="#333" stroke-width="1"/>
    <text x="80" y="335" fill="#27ae60" font-size="12" font-weight="bold">AUDIO + SENSING</text>
    <text class="c1" x="80" y="355" fill="#27ae60" font-size="11">&#10003;</text><text class="c1" x="100" y="355" fill="#aaa" font-size="11">SD audio through headphones</text>
    <text class="c2" x="80" y="373" fill="#27ae60" font-size="11">&#10003;</text><text class="c2" x="100" y="373" fill="#aaa" font-size="11">Touch pads trigger samples</text>
    <text class="c3" x="80" y="391" fill="#27ae60" font-size="11">&#10003;</text><text class="c3" x="100" y="391" fill="#aaa" font-size="11">5 faders smooth, no jitter</text>
    <text class="c4" x="80" y="409" fill="#27ae60" font-size="11">&#10003;</text><text class="c4" x="100" y="409" fill="#aaa" font-size="11">NeoPixels no audio glitch</text>
    <text class="c5" x="80" y="427" fill="#27ae60" font-size="11">&#10003;</text><text class="c5" x="100" y="427" fill="#aaa" font-size="11">7 encoders + 4 buttons + nav</text>
    <text class="c6" x="80" y="445" fill="#27ae60" font-size="11">&#10003;</text><text class="c6" x="100" y="445" fill="#aaa" font-size="11">GPS fix outdoors</text>

    <rect x="460" y="310" width="380" height="160" rx="8" fill="#0a0a0a" stroke="#333" stroke-width="1"/>
    <text x="480" y="335" fill="#5dade2" font-size="12" font-weight="bold">DISPLAY + CONNECTIVITY</text>
    <text class="c7" x="480" y="355" fill="#27ae60" font-size="11">&#10003;</text><text class="c7" x="500" y="355" fill="#aaa" font-size="11">OLED shows GPS + status</text>
    <text class="c8" x="480" y="373" fill="#27ae60" font-size="11">&#10003;</text><text class="c8" x="500" y="373" fill="#aaa" font-size="11">LCD waveform/UI running</text>
    <text class="c9" x="480" y="391" fill="#27ae60" font-size="11">&#10003;</text><text class="c9" x="500" y="391" fill="#aaa" font-size="11">ESP32 WiFi connected</text>
    <text class="c10" x="480" y="409" fill="#27ae60" font-size="11">&#10003;</text><text class="c10" x="500" y="409" fill="#aaa" font-size="11">UART messages flowing</text>
    <text class="c11" x="480" y="427" fill="#27ae60" font-size="11">&#10003;</text><text class="c11" x="500" y="427" fill="#aaa" font-size="11">No I2C bus errors</text>
    <text class="c12" x="480" y="445" fill="#e74c3c" font-size="11">&#10003;</text><text class="c12" x="500" y="445" fill="#f39c12" font-size="11">CPU &lt; 70%</text>
</g>

<!-- Final banner -->
<g class="final">
    <rect x="200" y="478" width="500" height="0" rx="0" fill="none"/>
    <text x="450" y="478" fill="#27ae60" font-size="18" font-weight="bold" text-anchor="middle">PROTOTYPE COMPLETE</text>
</g>
</svg>
