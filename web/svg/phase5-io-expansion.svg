<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 530">
<style>
    text { font-family: 'Courier New', monospace; }
    .fade { opacity: 0; }
    .s1 { animation: fadeIn 0.6s ease forwards 0.5s; }
    .s2 { animation: fadeIn 0.6s ease forwards 2.0s; }
    .s3 { animation: fadeIn 0.6s ease forwards 3.5s; }
    .s4 { animation: fadeIn 0.6s ease forwards 5.0s; }
    .s5 { animation: fadeIn 0.6s ease forwards 6.5s; }
    .w1 { stroke-dasharray: 200; stroke-dashoffset: 200; animation: draw 0.6s ease forwards 0.8s; }
    .w2 { stroke-dasharray: 300; stroke-dashoffset: 300; animation: draw 0.8s ease forwards 2.5s; }
    .w3 { stroke-dasharray: 300; stroke-dashoffset: 300; animation: draw 0.8s ease forwards 4.0s; }
    .spin { animation: rotate 3s linear infinite 6.0s; transform-origin: center; }
    .blink { animation: blink 1s ease infinite 8.0s; opacity: 0; }
    @keyframes fadeIn { to { opacity: 1; } }
    @keyframes draw { to { stroke-dashoffset: 0; } }
    @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
</style>
<rect width="900" height="530" fill="#0d0d0d"/>

<text x="450" y="35" fill="#27ae60" font-size="20" font-weight="bold" text-anchor="middle">PHASE 5: I/O Expansion</text>
<text x="450" y="55" fill="#555" font-size="12" text-anchor="middle">4 direct buttons + 2x MCP23017 + 7 encoders + 5-way nav</text>

<!-- Teensy -->
<rect x="300" y="75" width="300" height="55" rx="6" fill="#1a5c1a" stroke="#27ae60" stroke-width="2"/>
<text x="450" y="100" fill="#fff" font-size="13" font-weight="bold" text-anchor="middle">TEENSY 4.1</text>
<text x="450" y="118" fill="#8fce8f" font-size="9" text-anchor="middle">Pins 2-5: buttons | 16/17: I2C1 for MCP23017s</text>

<!-- Step 1: 4 direct buttons -->
<g class="fade s1">
    <rect x="40" y="72" width="65" height="35" rx="6" fill="#333" stroke="#888" stroke-width="2"/>
    <text x="72" y="93" fill="#fff" font-size="9" font-weight="bold" text-anchor="middle">MODE</text>
    <text x="72" y="118" fill="#888" font-size="8" text-anchor="middle">pin 2</text>
    <rect x="115" y="72" width="65" height="35" rx="6" fill="#333" stroke="#888" stroke-width="2"/>
    <text x="147" y="93" fill="#fff" font-size="9" font-weight="bold" text-anchor="middle">SHIFT</text>
    <text x="147" y="118" fill="#888" font-size="8" text-anchor="middle">pin 3</text>
    <rect x="190" y="72" width="55" height="35" rx="6" fill="#333" stroke="#e74c3c" stroke-width="2"/>
    <text x="217" y="93" fill="#e74c3c" font-size="9" font-weight="bold" text-anchor="middle">REC</text>
    <text x="217" y="118" fill="#888" font-size="8" text-anchor="middle">pin 4</text>
    <rect x="255" y="72" width="55" height="35" rx="6" fill="#333" stroke="#27ae60" stroke-width="2"/>
    <text x="282" y="93" fill="#27ae60" font-size="9" font-weight="bold" text-anchor="middle">PLAY</text>
    <text x="282" y="118" fill="#888" font-size="8" text-anchor="middle">pin 5</text>
</g>
<line class="w1" x1="240" y1="95" x2="300" y2="95" stroke="#888" stroke-width="1.5"/>

<!-- Step 2: MCP23017 #1 -->
<g class="fade s2">
    <rect x="80" y="180" width="300" height="110" rx="6" fill="#2a1a00" stroke="#e67e22" stroke-width="2"/>
    <!-- DIP chip shape -->
    <rect x="170" y="195" width="120" height="50" rx="2" fill="#222" stroke="#555" stroke-width="1"/>
    <circle cx="180" cy="220" r="5" fill="#333" stroke="#555"/>
    <text x="230" y="225" fill="#f39c12" font-size="14" font-weight="bold" text-anchor="middle">MCP23017 #1</text>
    <text x="230" y="265" fill="#888" font-size="10" text-anchor="middle">I2C1: 0x20 (A0=A1=A2=GND)</text>
    <text x="230" y="280" fill="#666" font-size="9" text-anchor="middle">16 GPIO: 5 encoders (15 pins) + 1 spare</text>
</g>
<line class="w2" x1="230" y1="180" x2="380" y2="130" stroke="#e67e22" stroke-width="2"/>

<!-- Step 3: MCP23017 #2 -->
<g class="fade s3">
    <rect x="520" y="180" width="300" height="110" rx="6" fill="#2a1a00" stroke="#e67e22" stroke-width="2"/>
    <rect x="610" y="195" width="120" height="50" rx="2" fill="#222" stroke="#555" stroke-width="1"/>
    <circle cx="620" cy="220" r="5" fill="#333" stroke="#555"/>
    <text x="670" y="225" fill="#f39c12" font-size="14" font-weight="bold" text-anchor="middle">MCP23017 #2</text>
    <text x="670" y="265" fill="#888" font-size="10" text-anchor="middle">I2C1: 0x21 (A0=3.3V)</text>
    <text x="670" y="280" fill="#666" font-size="9" text-anchor="middle">16 GPIO: 2 enc + 5-way nav = 11 used</text>
</g>
<line class="w3" x1="670" y1="180" x2="520" y2="130" stroke="#e67e22" stroke-width="2"/>

<!-- Step 4: Encoders -->
<g class="fade s4">
    <!-- 5 encoders for MCP#1 -->
    <g>
        <circle cx="100" cy="350" r="22" fill="#1a1a1a" stroke="#cd7f32" stroke-width="2"/>
        <circle cx="100" cy="350" r="5" fill="#e74c3c"/>
        <line x1="100" y1="340" x2="100" y2="330" stroke="#ccc" stroke-width="2"/>
        <text x="100" y="382" fill="#888" font-size="8" text-anchor="middle">Enc 1</text>
    </g>
    <g>
        <circle cx="160" cy="350" r="22" fill="#1a1a1a" stroke="#f39c12" stroke-width="2"/>
        <circle cx="160" cy="350" r="5" fill="#f39c12"/>
        <line x1="160" y1="340" x2="155" y2="328" stroke="#ccc" stroke-width="2"/>
        <text x="160" y="382" fill="#888" font-size="8" text-anchor="middle">Enc 2</text>
    </g>
    <g>
        <circle cx="220" cy="350" r="22" fill="#1a1a1a" stroke="#f1c40f" stroke-width="2"/>
        <circle cx="220" cy="350" r="5" fill="#f1c40f"/>
        <line x1="220" y1="340" x2="225" y2="328" stroke="#ccc" stroke-width="2"/>
        <text x="220" y="382" fill="#888" font-size="8" text-anchor="middle">Enc 3</text>
    </g>
    <g>
        <circle cx="280" cy="350" r="22" fill="#1a1a1a" stroke="#27ae60" stroke-width="2"/>
        <circle cx="280" cy="350" r="5" fill="#27ae60"/>
        <line x1="280" y1="340" x2="280" y2="330" stroke="#ccc" stroke-width="2"/>
        <text x="280" y="382" fill="#888" font-size="8" text-anchor="middle">Enc 4</text>
    </g>
    <g>
        <circle cx="340" cy="350" r="22" fill="#1a1a1a" stroke="#3498db" stroke-width="2"/>
        <circle cx="340" cy="350" r="5" fill="#3498db"/>
        <line x1="340" y1="340" x2="335" y2="328" stroke="#ccc" stroke-width="2"/>
        <text x="340" y="382" fill="#888" font-size="8" text-anchor="middle">Enc 5</text>
    </g>
    <text x="220" y="400" fill="#e67e22" font-size="9" text-anchor="middle">&#8594; MCP #1 (GPA0-GPB6)</text>
    <line x1="220" y1="325" x2="220" y2="290" stroke="#e67e22" stroke-width="1" stroke-dasharray="3"/>

    <!-- 2 encoders for MCP#2 -->
    <g>
        <circle cx="580" cy="350" r="22" fill="#1a1a1a" stroke="#8e24aa" stroke-width="2"/>
        <circle cx="580" cy="350" r="5" fill="#8e24aa"/>
        <line x1="580" y1="340" x2="580" y2="330" stroke="#ccc" stroke-width="2"/>
        <text x="580" y="382" fill="#888" font-size="8" text-anchor="middle">Enc 6</text>
    </g>
    <g>
        <circle cx="640" cy="350" r="22" fill="#1a1a1a" stroke="#e74c3c" stroke-width="2"/>
        <circle cx="640" cy="350" r="5" fill="#e74c3c"/>
        <line x1="640" y1="340" x2="635" y2="328" stroke="#ccc" stroke-width="2"/>
        <text x="640" y="382" fill="#888" font-size="8" text-anchor="middle">Enc 7</text>
    </g>
    <line x1="610" y1="325" x2="650" y2="290" stroke="#e67e22" stroke-width="1" stroke-dasharray="3"/>

    <!-- 5-way nav -->
    <rect x="720" y="330" width="80" height="50" rx="8" fill="#1a1a1a" stroke="#5dade2" stroke-width="2"/>
    <text x="760" y="350" fill="#5dade2" font-size="9" font-weight="bold" text-anchor="middle">5-WAY</text>
    <text x="760" y="365" fill="#5dade2" font-size="8" text-anchor="middle">NAV</text>
    <!-- Direction arrows -->
    <text x="760" y="342" fill="#888" font-size="12" text-anchor="middle">&#9650;</text>
    <text x="745" y="360" fill="#888" font-size="12" text-anchor="middle">&#9664;</text>
    <text x="775" y="360" fill="#888" font-size="12" text-anchor="middle">&#9654;</text>
    <text x="760" y="377" fill="#888" font-size="12" text-anchor="middle">&#9660;</text>
    <text x="760" y="395" fill="#888" font-size="8" text-anchor="middle">&#8594; MCP #2</text>
    <line x1="760" y1="330" x2="720" y2="290" stroke="#5dade2" stroke-width="1" stroke-dasharray="3"/>
</g>

<!-- Step 5: wiring notes -->
<g class="fade s5">
    <text x="100" y="430" fill="#666" font-size="9">Each encoder: C (common) &#8594; GND | A + B &#8594; GPIO | SW &#8594; GPIO</text>
    <text x="100" y="445" fill="#666" font-size="9">Enable MCP internal pull-ups in firmware | 100nF cap on each VDD-VSS</text>
    <text x="100" y="460" fill="#f1c40f" font-size="9">&#9888; Watch DIP notch orientation! Pin 1 at notch end. RESET &#8594; 3.3V (tie high).</text>
</g>

<!-- Validation -->
<g class="blink">
    <rect x="130" y="478" width="640" height="36" rx="8" fill="#0a2a0a" stroke="#27ae60" stroke-width="2"/>
    <text x="450" y="501" fill="#27ae60" font-size="13" font-weight="bold" text-anchor="middle">&#10003; 7 ENCODERS + 4 BUTTONS + NAV SWITCH &mdash; ALL RESPOND</text>
</g>
</svg>
