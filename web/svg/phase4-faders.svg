<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480">
<style>
    text { font-family: 'Courier New', monospace; }
    .fade { opacity: 0; }
    .s1 { animation: fadeIn 0.6s ease forwards 0.5s; }
    .s2 { animation: fadeIn 0.6s ease forwards 1.8s; }
    .s3 { animation: fadeIn 0.6s ease forwards 3.2s; }
    .s4 { animation: fadeIn 0.6s ease forwards 4.5s; }
    .s5 { animation: fadeIn 0.6s ease forwards 5.8s; }
    .w1 { stroke-dasharray: 300; stroke-dashoffset: 300; animation: draw 0.8s ease forwards 1.2s; }
    .w2 { stroke-dasharray: 200; stroke-dashoffset: 200; animation: draw 0.6s ease forwards 3.8s; }
    .slide { animation: slideUp 2s ease infinite 5.5s; }
    .blink { animation: blink 1s ease infinite 7.0s; opacity: 0; }
    @keyframes fadeIn { to { opacity: 1; } }
    @keyframes draw { to { stroke-dashoffset: 0; } }
    @keyframes slideUp { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
</style>
<rect width="900" height="480" fill="#0d0d0d"/>

<text x="450" y="35" fill="#27ae60" font-size="20" font-weight="bold" text-anchor="middle">PHASE 4: ADS1115 + Slide Faders</text>
<text x="450" y="55" fill="#555" font-size="12" text-anchor="middle">5 slide pots for mix, FX depth, modulation, tempo, crossfade</text>

<!-- Teensy -->
<rect x="300" y="75" width="300" height="50" rx="6" fill="#1a5c1a" stroke="#27ae60" stroke-width="2"/>
<text x="450" y="102" fill="#fff" font-size="13" font-weight="bold" text-anchor="middle">TEENSY 4.1</text>
<text x="450" y="118" fill="#8fce8f" font-size="9" text-anchor="middle">Pin 14 (A0) for crossfader direct read</text>

<!-- Step 1: ADS1115 -->
<g class="fade s1">
    <rect x="330" y="160" width="240" height="80" rx="6" fill="#1a1a2e" stroke="#3498db" stroke-width="2"/>
    <text x="450" y="190" fill="#5dade2" font-size="14" font-weight="bold" text-anchor="middle">ADS1115</text>
    <text x="450" y="208" fill="#888" font-size="11" text-anchor="middle">16-bit ADC — 4 channels</text>
    <text x="450" y="228" fill="#666" font-size="10" text-anchor="middle">I2C0: 0x48 | ADDR=GND | VDD=3.3V</text>
</g>
<line class="w1" x1="450" y1="160" x2="450" y2="125" stroke="#3498db" stroke-width="2"/>

<!-- Step 2: 4 Pots to ADS1115 -->
<g class="fade s2">
    <!-- Pot 1 -->
    <g>
        <rect x="90" y="290" width="100" height="70" rx="4" fill="#1a1a1a" stroke="#f39c12" stroke-width="1.5"/>
        <rect x="130" y="300" width="8" height="50" rx="2" fill="#333"/>
        <rect class="slide" x="126" y="320" width="16" height="10" rx="2" fill="#f39c12"/>
        <text x="140" y="375" fill="#f39c12" font-size="10" text-anchor="middle">Pot 1: MIX</text>
        <text x="140" y="388" fill="#666" font-size="9" text-anchor="middle">&#8594; A0</text>
    </g>
    <!-- Pot 2 -->
    <g>
        <rect x="210" y="290" width="100" height="70" rx="4" fill="#1a1a1a" stroke="#f39c12" stroke-width="1.5"/>
        <rect x="250" y="300" width="8" height="50" rx="2" fill="#333"/>
        <rect class="slide" x="246" y="310" width="16" height="10" rx="2" fill="#f39c12" style="animation-delay:6.0s"/>
        <text x="260" y="375" fill="#f39c12" font-size="10" text-anchor="middle">Pot 2: FX</text>
        <text x="260" y="388" fill="#666" font-size="9" text-anchor="middle">&#8594; A1</text>
    </g>
    <!-- Pot 3 -->
    <g>
        <rect x="330" y="290" width="100" height="70" rx="4" fill="#1a1a1a" stroke="#f39c12" stroke-width="1.5"/>
        <rect x="370" y="300" width="8" height="50" rx="2" fill="#333"/>
        <rect class="slide" x="366" y="330" width="16" height="10" rx="2" fill="#f39c12" style="animation-delay:6.5s"/>
        <text x="380" y="375" fill="#f39c12" font-size="10" text-anchor="middle">Pot 3: MOD</text>
        <text x="380" y="388" fill="#666" font-size="9" text-anchor="middle">&#8594; A2</text>
    </g>
    <!-- Pot 4 -->
    <g>
        <rect x="450" y="290" width="100" height="70" rx="4" fill="#1a1a1a" stroke="#f39c12" stroke-width="1.5"/>
        <rect x="490" y="300" width="8" height="50" rx="2" fill="#333"/>
        <rect class="slide" x="486" y="315" width="16" height="10" rx="2" fill="#f39c12" style="animation-delay:7.0s"/>
        <text x="500" y="375" fill="#f39c12" font-size="10" text-anchor="middle">Pot 4: TEMPO</text>
        <text x="500" y="388" fill="#666" font-size="9" text-anchor="middle">&#8594; A3</text>
    </g>
    <!-- Wires from pots to ADS1115 -->
    <line x1="140" y1="290" x2="360" y2="240" stroke="#f39c12" stroke-width="1" stroke-dasharray="3"/>
    <line x1="260" y1="290" x2="400" y2="240" stroke="#f39c12" stroke-width="1" stroke-dasharray="3"/>
    <line x1="380" y1="290" x2="440" y2="240" stroke="#f39c12" stroke-width="1" stroke-dasharray="3"/>
    <line x1="500" y1="290" x2="490" y2="240" stroke="#f39c12" stroke-width="1" stroke-dasharray="3"/>
</g>

<!-- Step 3: Pot 5 crossfader direct -->
<g class="fade s3">
    <rect x="620" y="290" width="130" height="70" rx="4" fill="#1a1a1a" stroke="#e74c3c" stroke-width="2"/>
    <rect x="675" y="300" width="8" height="50" rx="2" fill="#333"/>
    <rect class="slide" x="671" y="325" width="16" height="10" rx="2" fill="#e74c3c" style="animation-delay:7.5s"/>
    <text x="685" y="375" fill="#e74c3c" font-size="10" text-anchor="middle">Pot 5: XFADE</text>
    <text x="685" y="388" fill="#666" font-size="9" text-anchor="middle">&#8594; Teensy pin 14 (A0)</text>
    <line class="w2" x1="685" y1="290" x2="550" y2="100" stroke="#e74c3c" stroke-width="1.5"/>
    <text x="630" y="195" fill="#e74c3c" font-size="9" transform="rotate(50,630,195)">direct ADC</text>
</g>

<!-- Step 4: Wiring notes -->
<g class="fade s4">
    <rect x="60" y="405" width="380" height="45" rx="4" fill="#2a1500" stroke="#e67e22" stroke-width="1"/>
    <text x="80" y="425" fill="#e67e22" font-size="10" font-weight="bold">&#9888; All pots: Right pin to 3.3V (NOT 5V!)</text>
    <text x="80" y="440" fill="#c68600" font-size="9">Left pin to GND. 100nF cap: each wiper to GND.</text>
</g>

<!-- Step 5: Test output -->
<g class="fade s5">
    <rect x="480" y="405" width="380" height="45" rx="4" fill="#0a0a0a" stroke="#333" stroke-width="1"/>
    <text x="500" y="425" fill="#5dade2" font-size="10">ads.readADC_SingleEnded(0)</text>
    <text x="500" y="440" fill="#888" font-size="9">Sweep: 0 &#8594; ~26000 smooth, no jitter</text>
</g>

<!-- Validation -->
<g class="blink">
    <rect x="200" y="460" width="500" height="36" rx="8" fill="#0a2a0a" stroke="#27ae60" stroke-width="2"/>
    <text x="450" y="483" fill="#27ae60" font-size="14" font-weight="bold" text-anchor="middle">&#10003; ALL 5 FADERS SWEEP SMOOTHLY</text>
</g>
</svg>
