<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560">
<style>
    text { font-family: 'Courier New', monospace; }
    .fade { opacity: 0; }
    .s1 { animation: fadeIn 0.6s ease forwards 0.5s; }
    .s2 { animation: fadeIn 0.6s ease forwards 2.0s; }
    .s3 { animation: fadeIn 0.6s ease forwards 3.5s; }
    .s4 { animation: fadeIn 0.6s ease forwards 5.0s; }
    .s5 { animation: fadeIn 0.6s ease forwards 6.5s; }
    .w1 { stroke-dasharray: 300; stroke-dashoffset: 300; animation: draw 0.8s ease forwards 1.2s; }
    .w2 { stroke-dasharray: 400; stroke-dashoffset: 400; animation: draw 1.0s ease forwards 2.8s; }
    .w3 { stroke-dasharray: 300; stroke-dashoffset: 300; animation: draw 0.8s ease forwards 4.2s; }
    .blink { animation: blink 1s ease infinite 7.5s; opacity: 0; }
    @keyframes fadeIn { to { opacity: 1; } }
    @keyframes draw { to { stroke-dashoffset: 0; } }
    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
</style>
<rect width="900" height="560" fill="#0d0d0d"/>

<text x="450" y="35" fill="#27ae60" font-size="20" font-weight="bold" text-anchor="middle">PHASE 3: Displays + NeoPixels</text>
<text x="450" y="55" fill="#555" font-size="12" text-anchor="middle">OLED on I2C0 + LCD on SPI + NeoPixels on GPIO</text>

<!-- Teensy (context) -->
<rect x="300" y="80" width="300" height="55" rx="6" fill="#1a5c1a" stroke="#27ae60" stroke-width="2"/>
<text x="450" y="105" fill="#fff" font-size="13" font-weight="bold" text-anchor="middle">TEENSY 4.1</text>
<text x="450" y="125" fill="#8fce8f" font-size="9" text-anchor="middle">18/19=I2C0 | 10-13=SPI | 9=DC | 15=RST | 6=NeoPixel</text>

<!-- Step 1: OLED -->
<g class="fade s1">
    <rect x="40" y="190" width="200" height="120" rx="6" fill="#1a1a2e" stroke="#3498db" stroke-width="2"/>
    <!-- Simulated OLED screen -->
    <rect x="60" y="205" width="160" height="60" rx="2" fill="#000" stroke="#222" stroke-width="1"/>
    <text x="140" y="228" fill="#fff" font-size="10" text-anchor="middle">Oh My Ondas</text>
    <text x="140" y="248" fill="#27ae60" font-size="9" text-anchor="middle">System Ready</text>
    <text x="140" y="280" fill="#5dade2" font-size="11" text-anchor="middle">SSD1306 0.96"</text>
    <text x="140" y="295" fill="#666" font-size="9" text-anchor="middle">I2C0: 0x3C</text>
</g>
<line class="w1" x1="240" y1="230" x2="300" y2="110" stroke="#3498db" stroke-width="2"/>
<g class="fade s1">
    <text x="40" y="340" fill="#444" font-size="10">STEP 1: OLED &rarr; SDA=pin 18, SCL=pin 19, VCC=3.3V, GND</text>
    <text x="40" y="355" fill="#3498db" font-size="9">I2C0 scan: 0x0A (audio) + 0x3C (OLED)</text>
</g>

<!-- Step 2: ILI9341 LCD -->
<g class="fade s2">
    <rect x="340" y="190" width="220" height="180" rx="6" fill="#2a1a00" stroke="#e67e22" stroke-width="2"/>
    <!-- Simulated LCD screen -->
    <rect x="355" y="205" width="190" height="110" rx="3" fill="#111" stroke="#333" stroke-width="1"/>
    <rect x="370" y="215" width="30" height="80" rx="1" fill="#27ae60" opacity="0.6"/>
    <rect x="410" y="230" width="30" height="65" rx="1" fill="#3498db" opacity="0.6"/>
    <rect x="450" y="220" width="30" height="75" rx="1" fill="#e67e22" opacity="0.6"/>
    <rect x="490" y="240" width="30" height="55" rx="1" fill="#8e24aa" opacity="0.6"/>
    <text x="450" y="330" fill="#f39c12" font-size="12" text-anchor="middle">ILI9341 2.8" TFT</text>
    <text x="450" y="345" fill="#888" font-size="10" text-anchor="middle">SPI with DMA</text>
    <text x="450" y="360" fill="#666" font-size="9" text-anchor="middle">CS=10 DC=9 RST=15</text>
</g>
<line class="w2" x1="450" y1="190" x2="450" y2="135" stroke="#e67e22" stroke-width="2"/>

<!-- Pin 8 conflict warning -->
<g class="fade s2">
    <rect x="280" y="380" width="340" height="30" rx="4" fill="#2a1500" stroke="#e67e22" stroke-width="1"/>
    <text x="450" y="400" fill="#e67e22" font-size="10" font-weight="bold" text-anchor="middle">&#9888; RST=pin 15 NOT pin 8 (I2S conflict!)</text>
</g>

<!-- Step 3: NeoPixels -->
<g class="fade s3">
    <rect x="660" y="190" width="200" height="100" rx="6" fill="#0a2a1a" stroke="#27ae60" stroke-width="2"/>
    <!-- 8 LED dots -->
    <circle cx="690" cy="230" r="8" fill="#e74c3c"/>
    <circle cx="710" cy="230" r="8" fill="#e67e22"/>
    <circle cx="730" cy="230" r="8" fill="#f1c40f"/>
    <circle cx="750" cy="230" r="8" fill="#27ae60"/>
    <circle cx="770" cy="230" r="8" fill="#3498db"/>
    <circle cx="790" cy="230" r="8" fill="#8e24aa"/>
    <circle cx="810" cy="230" r="8" fill="#e74c3c"/>
    <circle cx="830" cy="230" r="8" fill="#2ecc71"/>
    <text x="760" y="265" fill="#27ae60" font-size="11" text-anchor="middle">WS2812B x8</text>
    <text x="760" y="280" fill="#666" font-size="9" text-anchor="middle">DIN=pin 6 via 470&#937;</text>
</g>
<line class="w3" x1="660" y1="230" x2="600" y2="110" stroke="#27ae60" stroke-width="2"/>

<!-- Step 4: SPI wiring table -->
<g class="fade s4">
    <rect x="40" y="420" width="400" height="100" rx="6" fill="#0a0a0a" stroke="#333" stroke-width="1"/>
    <text x="60" y="442" fill="#e67e22" font-size="11" font-weight="bold">SPI Wiring:</text>
    <text x="60" y="460" fill="#aaa" font-size="10">CLK&#8594;13  MOSI&#8594;11  MISO&#8594;12</text>
    <text x="60" y="478" fill="#aaa" font-size="10">CS&#8594;10   DC&#8594;9     RST&#8594;15</text>
    <text x="60" y="496" fill="#aaa" font-size="10">LITE&#8594;3.3V (always on)  VIN&#8594;3.3V</text>
    <text x="60" y="510" fill="#666" font-size="9">ILI9341_t3 tft(10, 9, 15);</text>
</g>

<!-- Step 5: NeoPixel tip -->
<g class="fade s5">
    <rect x="500" y="420" width="360" height="50" rx="6" fill="#0a2a1a" stroke="#27ae60" stroke-width="1"/>
    <text x="520" y="440" fill="#27ae60" font-size="10" font-weight="bold">NeoPixel tip:</text>
    <text x="520" y="458" fill="#888" font-size="9">If audio glitches: use WS2812Serial</text>
    <text x="520" y="470" fill="#888" font-size="9">library with a Serial TX pin</text>
</g>

<!-- Validation -->
<g class="blink">
    <rect x="150" y="500" width="600" height="40" rx="8" fill="#0a2a0a" stroke="#27ae60" stroke-width="2"/>
    <text x="450" y="525" fill="#27ae60" font-size="14" font-weight="bold" text-anchor="middle">&#10003; OLED + LCD + NeoPixels &mdash; AUDIO STILL CLEAN</text>
</g>
</svg>
